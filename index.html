<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Testes</title>
</head>

<body>
    <header>
        <h1>Analisador de Números</h1>
    </header>
    <section>
        <div class="info">
            <p>Número (entre 1 e 100):</p>
            <input type="number" id="number">
            <button id="add-number" onclick="check()"> Adicionar </button>
        </div>
        <div class="select">
            <select id="numbers" size="10">
                
            </select>
        </div>
        <div class="actions">
            <button id="clear" onclick="clean()">Limpar</button>
            <button id="finish" onclick="calculation()">Finalizar</button>
        </div>
        <div id="res">
            <p class="qnt"></p>
            <p class="maior"></p>
            <p class="menor"></p>
            <p class="soma"></p>
            <p class="media"></p>
        </div>
    </section>
    <footer>
        <p>&copy; Matheus Cortinovis</p>
    </footer>
</body>
<script src="src/index.js"></script>

</html>
